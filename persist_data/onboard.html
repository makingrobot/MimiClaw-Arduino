<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width,initial-scale=1'>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>MimiClaw 设置</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: -apple-system, sans-serif;
            background: #f5f5f5;
            color: #333;
            padding: 16px;
            max-width: 480px;
            margin: 0 auto
        }

        h1 {
            text-align: center;
            margin: 16px 0;
            font-size: 1.4em;
            color: #1a73e8
        }

        .card {
            background: #fff;
            border-radius: 12px;
            margin: 12px 0;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .12);
            overflow: hidden
        }

        .card-hdr {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            cursor: pointer;
            user-select: none;
            font-weight: 600;
            font-size: .95em
        }

        .card-hdr::after {
            content: '\25BC';
            font-size: .7em;
            transition: transform .2s
        }

        .card.collapsed .card-hdr::after {
            transform:rotate(-90deg)
        }
 
        .card.collapsed .card-body {
            display: none
        }

        .card-body {
            padding: 0 16px 16px
        }

        label {
            display: block;
            margin: 10px 0 4px;
            font-size: .85em;
            color: #555
        }

        input,
        select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: .95em;
            outline: none
        }

        input:focus,
        select:focus {
            border-color: #1a73e8
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            margin: 8px 0
        }

        .btn-scan {
            background: #e8f0fe;
            color: #1a73e8
        }

        .btn-save {
            background: #1a73e8;
            color: #fff;
            margin-top: 20px;
            font-size: 1.1em
        }

        .btn:active {
            opacity: .8
        }

        .ap-list {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin: 8px 0
        }

        .ap-item {
            padding: 10px 12px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            display: flex;
            justify-content: space-between
        }

        .ap-item:last-child {
            border-bottom: none
        }

        .ap-item:active {
            background: #e8f0fe
        }

        .ap-rssi {
            color: #888;
            font-size: .85em
        }

        .ap-lock::before {
            content: '\1F512';
            font-size: .75em;
            margin-right: 4px
        }

        .status {
            text-align: center;
            padding: 20px;
            color: #1a73e8;
            font-size: 1.1em;
            display: none
        }
    </style>
</head>

<body>
    <h1>MimiClaw 设置</h1>
    <p style='text-align:center;color:#666;font-size:.9em;margin-bottom:12px'>
        此门户网站仍可通过 192.168.4.1 访问，以获取后续更新。
    </p>

    <!-- WiFi section (expanded by default) -->
    <div class='card' id='sec-wifi'>
        <div class='card-hdr' onclick='toggle(this)'>WiFi 配置</div>
        <div class='card-body'>
            <button class='btn btn-scan' onclick='scan()'>扫描 WiFi 网络</button>
            <div class='ap-list' id='ap-list' style='display:none'></div>
            <label>SSID</label>
            <input id='ssid' placeholder='WiFi network name'>
            <label>Password</label>
            <input id='password' type='password' placeholder='WiFi password'>
        </div>
    </div>

    <!--- LLM section -->
    <div class='card collapsed' id='sec-llm'>
        <div class='card-hdr' onclick='toggle(this)'>LLM 配置</div>
        <div class='card-body'>
            <label>API Key</label>
            <input id='llm_api_key' type='password' placeholder='sk-...'>
            <label>模型</label>
            <input id='llm_model' placeholder='claude-opus-4-5' value='claude-opus-4-5'>
            <label>服务商</label>
            <select id='llm_provider'>
                <option value='anthropic'>Anthropic</option>
                <option value='openai'>OpenAI</option>
                <option value='deepseek'>Deepseek</option>
            </select>
        </div>
    </div>

    <!-- Telegram section -->
    <div class='card collapsed' id='sec-tg'>
        <div class='card-hdr' onclick='toggle(this)'>Telegram Bot</div>
        <div class='card-body'>
            <label>Bot Token</label>
            <input id='tg_token' placeholder='123456:ABC-DEF...'>
        </div>
    </div>

    <!-- Feishu section -->
    <div class='card collapsed' id='sec-feishu'>
        <div class='card-hdr' onclick='toggle(this)'>飞书 Bot</div>
        <div class='card-body'>
            <label>App ID</label>
            <input id='feishu_app_id' placeholder='cli_xxxx'>
            <label>App Secret</label>
            <input id='feishu_app_secret' type='password' placeholder='App Secret'>
        </div>
    </div>

    <!-- Search section -->
    <div class='card collapsed' id='sec-search'>
        <div class='card-hdr' onclick='toggle(this)'>Web 搜索</div>
        <div class='card-body'>
            <label>服务商</label>
            <select id='search_provider'>
                <option value=''>None</option>
                <option value='brave'>Brave</option>
                <option value='tavily'>Tavily</option>
            </select>
            <label>Brave Search API Key</label>
            <input id='brave_key' type='password' placeholder='Brav...'>
            <label>Tavily API Key</label>
            <input id='tavily_key' type='password' placeholder='tvly-...'>
        </div>
    </div>

    <!-- Proxy section -->
    <div class='card collapsed' id='sec-proxy'>
        <div class='card-hdr' onclick='toggle(this)'>网络代理</div>
        <div class='card-body'>
            <label>Host</label>
            <input id='proxy_host' placeholder='192.168.1.100'>
            <label>Port</label>
            <input id='proxy_port' type='number' placeholder='7890'>
            <label>Type</label>
            <select id='proxy_type'>
                <option value=''>None</option>
                <option value='http'>HTTP</option>
                <option value='socks5'>SOCKS5</option>
            </select>
        </div>
    </div>

    <button class='btn btn-save' onclick='save()'>保存 &amp; 重启</button>
    <div class='status' id='status'>正在保存... 设备将重启.</div>

    <script>
        function toggle(el) {
            el.parentElement.classList.toggle('collapsed')
        }

        function loadConfig() {
            fetch('/config').then(r => r.json()).then(cfg => {
                Object.keys(cfg).forEach(k => {
                    var el = document.getElementById(k);
                    if (el && cfg[k] !== undefined && cfg[k] !== null) { el.value = cfg[k] }
                })
            }).catch(() => { })
        }

        function scan() {
            var btn = event.target; btn.textContent = '扫描中...'; btn.disabled = true;
            fetch('/scan').then(r => r.json()).then(list => {
                var el = document.getElementById('ap-list'); el.style.display = 'block'; el.innerHTML = '';
                list.forEach(ap => {
                    var d = document.createElement('div'); d.className = 'ap-item';
                    d.innerHTML = '<span>' + (ap.auth ? '<span class=ap-lock></span>' : '') + ap.ssid + '</span><span class=ap-rssi>' + ap.rssi + ' dBm</span>';
                    d.onclick = function () { document.getElementById('ssid').value = ap.ssid };
                    el.appendChild(d)
                });
                btn.textContent = '扫描 WiFi 网络'; btn.disabled = false;
            }).catch(() => { btn.textContent = '扫描 WiFi 网络'; btn.disabled = false })
        }

        function save() {
            var fields = ['ssid', 'password', 'llm_api_key', 'llm_model', 'llm_provider', 'tg_token',
                'feishu_app_id', 'feishu_app_secret', 'proxy_host', 'proxy_port', 'proxy_type', 'search_provider', 'tavily_key', 'brave_key'];
            var data = {};
            fields.forEach(f => { data[f] = document.getElementById(f).value.trim() });
            document.getElementById('status').style.display = 'block';
            fetch('/save', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) })
                .then(() => { document.getElementById('status').textContent = '已保存! 正在重启...'; })
                .catch(() => { document.getElementById('status').textContent = '出错. 请重试.'; })
        }
        loadConfig();
    </script>
</body>
</html>
